# === Model ===
model:
  name: Qwen/Qwen3-8B
  torch_dtype: bfloat16
  attn_implementation: sdpa

# === LoRA ===
lora:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.01
  target_modules: all-linear
  task_type: CAUSAL_LM
  bias: none

# === Data ===
data:
  dataset: Team-ACE/ToolACE
  max_seq_length: 2048

# === SFTConfig (full) ===
sft:
  # --- Output ---
  output_dir: ./output
  overwrite_output_dir: false
  save_safetensors: true
  save_only_model: false

  # --- Training schedule ---
  num_train_epochs: 1
  max_steps: -1
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4

  # --- Optimizer ---
  optim: adamw_torch_fused
  learning_rate: 5e-5
  weight_decay: 0.01
  max_grad_norm: 1.0

  # --- Scheduler ---
  lr_scheduler_type: cosine
  lr_scheduler_kwargs: null
  warmup_ratio: 0.05
  warmup_steps: 0

  # --- Precision ---
  bf16: true
  fp16: false
  tf32: null

  # --- Logging ---
  logging_strategy: steps
  logging_steps: 1
  logging_first_step: true
  logging_nan_inf_filter: true
  report_to:
    - trackio
    - tensorboard
  run_name: qwen3-8b-toolace-lora
  project: qwen3-8b-toolace-lora
  trackio_space_id: null
  include_tokens_per_second: true
  include_num_input_tokens_seen: true

  # --- Checkpointing ---
  save_strategy: epoch
  save_total_limit: 3

  # --- Evaluation ---
  eval_strategy: epoch
  per_device_eval_batch_size: 8
  eval_accumulation_steps: null
  eval_delay: 0
  eval_on_start: false
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false

  # --- Performance ---
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false
  dataloader_num_workers: 16
  dataloader_pin_memory: true
  dataloader_prefetch_factor: 2
  dataloader_persistent_workers: false
  dataloader_drop_last: false
  torch_compile: true
  auto_find_batch_size: false

  # --- Data handling ---
  group_by_length: true
  length_column_name: length
  remove_unused_columns: true

  # --- SFT-specific ---
  dataset_text_field: text
  dataset_kwargs:
    skip_prepare_dataset: true
  dataset_num_proc: null
  max_length: 2048
  packing: false
  packing_strategy: bfd
  padding_free: false
  pad_to_multiple_of: null
  eval_packing: null

  # --- Loss ---
  assistant_only_loss: false   # handled manually via label masking
  completion_only_loss: null
  loss_type: nll
  label_smoothing_factor: 0.0

  # --- Regularization ---
  neftune_noise_alpha: null

  # --- Distributed ---
  ddp_backend: null
  ddp_find_unused_parameters: null
  ddp_bucket_cap_mb: null
  ddp_broadcast_buffers: null
  ddp_timeout: 1800
  fsdp: null
  fsdp_config: null
  deepspeed: null

  # --- Reproducibility ---
  seed: 42
  data_seed: 42
  full_determinism: false

  # --- Hub ---
  push_to_hub: false
  hub_model_id: null
  hub_strategy: every_save
  hub_token: null
  hub_private_repo: null

  # --- Misc ---
  disable_tqdm: null
  skip_memory_metrics: true
  use_liger_kernel: false
  average_tokens_across_devices: true
  activation_offloading: false

# === Merge & Save ===
merge:
  enabled: true
  output_dir: ./output/merged
